version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: zkr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zkr_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - zkr_postgres_data:/var/lib/postgresql/data

volumes:
  zkr_postgres_data: